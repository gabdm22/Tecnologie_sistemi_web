<!DOCTYPE html>
<HTML>
    <HEAD>
        <TITLE>Contatta assistenza</TITLE>
        <META name="viewport" content="width=device-width, initial-scale=1.0">
        <LINK rel="stylesheet" href="style_form_assistenza.css">
    </HEAD>

    <BODY>
        <DIV>
            <H1 name="titolo" id="titolo">Contatta assistenza</H1>
            <H3 name="sottotitolo" id="sottotitolo">Spiega il tuo problema</H3>
            <FORM>
                <LABEL>Oggetto: </LABEL>
                <INPUT type="text" name="oggetto" id="oggetto" required>
                <br><br>
                
                <LABEL>Testo: </LABEL>
                <TEXTAREA name="messaggio" id="messaggio" rows="6" cols="40" placeholder="Scrivi qui il tuo messaggio..."></TEXTAREA>
                <br><br>

                <BUTTON type="submit" name="invia" id="invia">Invia</BUTTON>
            </FORM>

            <FOOTER>
                <P>&copy;2026 MoVA - Museum of Virtual Art. Created by Nicolò Carbone and Gabriele Di Martino</P>
            </FOOTER>
        </DIV>
    </BODY>
</HTML>
