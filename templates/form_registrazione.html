<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea il tuo account MoVA</title>
    <link rel="stylesheet" href="/static/style_form_registrazione.css">

    <SCRIPT src="/static/controllo_password.js" defer></SCRIPT>    <!-- script per controllo requisiti password -->
    <SCRIPT src="/static/validazione_password.js" defer></SCRIPT>   <!-- script per controllo conferma password -->
    <SCRIPT src="/static/controllo_email.js" defer></SCRIPT>   <!-- script per controllo email e username già esistenti -->
</head>
<body>
    <div class="registrazione-conteiner">
        <div class="FORM">              <!--Inserisce dati in entità "utente"-->
            <h1 id = "titolo-registrazione">REGISTRAZIONE</h1>
            <form action="/registrazione" method="post">
                <label for="Nome">Nome:</label>
                <input type="text" id="Nome" name="nome">
                <label for="Cognome">Cognome:</label>
                <input type="text" id="Cognome" name="cognome">
                <label for="username">Username:</label>
                <input type="text" id="Username" name="username">
                <span id="Username-feedback" class = "feedback"></span>
                <label for="email">Email:</label>
                <input type="email" id="Email" name="email">
                <span id="Email-feedback" class = "feedback"></span>
                <label for="password">Password:</label>
                <input type="password" id="pass1" name="password">
                <label for="confirm_password">Verifica Password:</label>
                <input type="password" id="pass2" name="verifica_password">
                <DIV id="messaggio" name="messaggio">Le password non corrispondono!</DIV>
                <button id = "registrazione-btn" type="submit">Registrati</button>
            </form>

            <div class="login-link"> 
                <h5 class="divider-text">Hai già un account MoVA?</h5>
                <a href="form_login.html" class="btn-mova">Accedi al tuo account MoVA</a>
            </div>
        </div>
    
        <footer>
            <P>&copy;2026 MoVA - Museum of Virtual Art. Created by Nicolò Carbone and Gabriele Di Martino</P>
        </footer>
   </div>
</body>
</html>
