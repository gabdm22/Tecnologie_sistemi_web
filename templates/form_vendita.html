<!DOCTYPE html>
<HTML>
    <HEAD>
        <TITLE>Vendi la tua opera</TITLE>
        <META name="viewport" content="width=device-width, initial-scale=1.0">
        <LINK href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
        <LINK rel="stylesheet" href="/static/style_form_vendita.css" type="text/css">
    </HEAD>

    <BODY>
        <DIV>
            <H1 id="titolo">Vendi</H1>
            
            {% if caricato %}
            <H3 class="successo-titolo">Opera caricata con successo!</H3>
            <P class="successo-testo">
                La tua opera è ora visibile in vetrina.<br>
            </P>
            
            <P class="contenitore-link">
                <A href="/vetrina.html" class="link-successo">Torna alla vetrina</A>
                <SPAN class="separatore">|</SPAN>
                <A href="/form_vendita.html" class="link-successo">Vendi ancora</A>
            </P>

            {% else %}
            
            <H3 id="sottotitolo">Carica qui la tua opera</H3>
            <FORM id="form" action="/upload" method="POST" name="form" enctype="multipart/form-data">   <!--Inserisce dati in entità "opera"-->
                <LABEL>Nome opera: </LABEL>
                <INPUT id="nome" name="nome" type="text" minlength="1" maxlength="30" required>
                <br><br>

                <LABEL>Prezzo (€): </LABEL>
                <INPUT id="prezzo" name="prezzo" type="number" required>
                <br><br>

                <LABEL>Categoria: </LABEL>
                <SELECT id="categoria" name="categoria" size="1" cols="10" required>
                    <OPTION selected value="Nessuna selezionata"></OPTION>
                    <OPTION>Pittura</OPTION>
                    <OPTION>Scultura</OPTION>
                    <OPTION>Musica</OPTION>
                    <OPTION>Cinema</OPTION>
                </SELECT>
                <br><br>

                <LABEL>Dimensioni: </LABEL>
                <INPUT id="dimensioni" name="dimensioni" type="text" minlength="0" maxlength="30">  <!--CAMPO OPZIONALE-->
                <br><br>

                <LABEL>Immagine: </LABEL>
                <INPUT id="file" name="immagine" type="file" accept="image/jpg, image/jpeg, image/png" value="Carica immagine" required>
                <br><br>

                <BUTTON id="invia" type="submit">Invia</BUTTON>
                <BUTTON id="reset" type="reset">Reset</BUTTON>
            </FORM>
            
            {% endif %}

            <FOOTER>
                <P>&copy;2026 MoVA - Museum of Virtual Art. Created by Nicolò Carbone and Gabriele Di Martino</P>
            </FOOTER>
        </DIV>
    </BODY>
</HTML>
