<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        
        <div class="FORM">
            <h1 id = "titolo-login">LOGIN</h1>
            <form action="/login" method="post">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
                <button id = "login-btn" type="submit">Login</button>
            </form>

            <div class="register-link"> 
                <h5 class="divider-text">Sei nuovo su MOVA?</h5>
                <a href="form_registrazione.html" class="btn-mova">Crea il tuo account MOVA</a>
            </div>
        </div>

        <footer>
            <P>&copy;2026 MOVA - Museum of Virtual Art. Created by Nicolò Carbone and Gabriele Di Martino</P>
        </footer>

    </div>
</body>
</html>
